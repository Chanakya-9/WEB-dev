<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css" />

</head>

<body>
    <h1>Simon Says</h1>
    <h2 id="level-title">Click "Start Game" to Play</h2>

    <div class="container">
        <div class="btn green" id="green"></div>
        <div class="btn red" id="red"></div>
        <div class="btn yellow" id="yellow"></div>
        <div class="btn blue" id="blue"></div>
    </div>

    <h3 id="final-score" style="display:none;">Score: 0</h3>
    <button id="restart-btn">Start Game</button>

    <script src="script.js"></script>


</body>

</html>
